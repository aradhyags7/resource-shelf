name: resource_shelf
description: A collaborative learning platform.

environment:
  sdk: "^3.9.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase (NO STORAGE)
  firebase_core: ^3.15.2
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.6.12

  # Open Google Drive links
  url_launcher: ^6.3.0

  # Date formatting
  intl: ^0.19.0

  # Utilities
  collection: ^1.18.0

  # State management
  flutter_riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
